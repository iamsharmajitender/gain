<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 248 36" role="img" aria-labelledby="gain-logo-title">
  <title id="gain-logo-title">Jitender Sharma</title>

  <!-- Icon mark -->
  <circle cx="18" cy="18" r="16" fill="none" stroke="#FFFFFF" stroke-width="1.25"/>
  <g transform="translate(18 18)" fill="none" stroke="#FFFFFF" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round">
    <!-- Hexagonal network / cube wireframe -->
    <polygon points="0,-9 7.8,-4.5 7.8,4.5 0,9 -7.8,4.5 -7.8,-4.5"/>
    <line x1="0" y1="-9" x2="0" y2="9"/>
    <line x1="7.8" y1="-4.5" x2="-7.8" y2="4.5"/>
    <line x1="7.8" y1="4.5" x2="-7.8" y2="-4.5"/>
    <circle cx="0" cy="0" r="1.35" fill="#FFFFFF" stroke="none"/>
  </g>

  <!-- Wordmark -->
  <text
    x="44"
    y="23.5"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="15.5"
    fill="#FFFFFF"
    letter-spacing="0.04em">
    <tspan font-weight="700">G.A.I.N</tspan>
    <tspan font-weight="500" dx="7">SYSTEMS</tspan>
  </text>
</svg>
